<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码加密测试</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <h1>密码加密解密测试</h1>
    
    <div>
        <h2>1. 原始密码</h2>
        <p>密码: <span id="originalPassword">12345</span></p>
        <p>SHA256 哈希: <span id="originalHash"></span></p>
    </div>
    
    <div>
        <h2>2. CryptoJS 加密</h2>
        <p>加密结果: <span id="encrypted"></span></p>
    </div>
    
    <div>
        <h2>3. CryptoJS 解密</h2>
        <p>解密结果: <span id="decrypted"></span></p>
        <p>解密后哈希: <span id="decryptedHash"></span></p>
    </div>
    
    <div>
        <h2>4. 匹配测试</h2>
        <p>结果: <span id="result"></span></p>
    </div>
    
    <script>
        const AES_SECRET_KEY = 'DDDProject2024SecretKey!';
        const AES_IV = 'DDDProject2024IV!';
        const testPassword = '12345';
        
        // 计算 SHA256 哈希
        function computeHash(password) {
            const hash = CryptoJS.SHA256(password);
            return CryptoJS.enc.Hex.stringify(hash).toLowerCase();
        }
        
        // CryptoJS AES 加密
        function aesEncrypt(text) {
            const key = CryptoJS.enc.Utf8.parse(AES_SECRET_KEY);
            const iv = CryptoJS.enc.Utf8.parse(AES_IV);
            
            const encrypted = CryptoJS.AES.encrypt(text, key, {
                iv: iv,
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            return encrypted.toString();
        }
        
        // CryptoJS AES 解密
        function aesDecrypt(encryptedText) {
            const key = CryptoJS.enc.Utf8.parse(AES_SECRET_KEY);
            const iv = CryptoJS.enc.Utf8.parse(AES_IV);
            
            const decrypted = CryptoJS.AES.decrypt(encryptedText, key, {
                iv: iv,
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            return CryptoJS.enc.Utf8.stringify(decrypted);
        }
        
        // 显示原始密码和哈希
        document.getElementById('originalPassword').textContent = testPassword;
        document.getElementById('originalHash').textContent = computeHash(testPassword);
        
        // 加密
        const encrypted = aesEncrypt(testPassword);
        document.getElementById('encrypted').textContent = encrypted;
        
        // 解密
        const decrypted = aesDecrypt(encrypted);
        document.getElementById('decrypted').textContent = decrypted;
        document.getElementById('decryptedHash').textContent = computeHash(decrypted);
        
        // 测试匹配
        const result = decrypted === testPassword ? '✅ 成功！' : '❌ 失败！';
        document.getElementById('result').textContent = result;
        
        console.log('原始密码:', testPassword);
        console.log('原始哈希:', computeHash(testPassword));
        console.log('加密结果:', encrypted);
        console.log('解密结果:', decrypted);
        console.log('解密后哈希:', computeHash(decrypted));
    </script>
</body>
</html>
